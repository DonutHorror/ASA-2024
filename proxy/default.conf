      proxy_set_header X-Url-Scheme $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;
      proxy_redirect off;
      proxy_pass http://gilson;
    }
}

server {
    listen 80;
    server_name mail.gilson.asa.br;

    #charset koi8-r;
